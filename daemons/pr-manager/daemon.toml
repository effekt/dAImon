[daemon]
backend = "claude"
schedule = { minutes = [3, 23, 43] }
command = "/pr-manager"
stuck_after = 1800
required_inputs = ["base", "manage_label", "merge_method"]

[inputs]
base = "main"
# A PR is "managed" if it is on a daimon/* branch (work-queue created it) or it
# carries this label (you opted a hand-authored PR in).
manage_label = "auto-pr-manage"
# Prefix on every comment this daemon posts, so reply-to-comments can tell its
# own comments from human replies.
bot_marker = "🤖"
# How approved PRs get merged: squash | merge | rebase.
merge_method = "squash"
# Per-run cap on fix attempts for a single PR before it is parked as ci-blocked.
max_fix_cycles = 3
# Re-evaluate a parked ci-blocked PR only after this many hours (avoids burning
# runs on a PR whose upstream cause has not changed).
blocked_recheck_hours = 6
# Flip a green, conflict-free, non-change-requested managed draft to ready-for-review
# so it enters the merge flow. Promotion does not merge — that still needs approval.
promote_drafts = true
# Minimum draft age (hours) before auto-promoting. 0 = promote as soon as it's green.
promote_min_age_hours = 2
# GitHub logins requested as reviewers on every managed PR (and on promotion).
# Blank relies on CODEOWNERS; with neither, a PR has no approver and never merges.
reviewers = []
# Optional business-hours merge window. Leave all three blank to merge any time
# CI is green. Set all three to gate ONLY the merge action (conflict and CI
# fixes always run). e.g. tz = "America/Toronto", start = "9", end = "21".
merge_window_tz = ""
merge_window_start = ""
merge_window_end = ""
