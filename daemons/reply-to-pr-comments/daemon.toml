[daemon]
backend = "claude"
model = "haiku"
schedule = { minutes = [17, 47] }
command = "/reply-to-pr-comments"
stuck_after = 600

[inputs]
bot_marker = "🤖"
# full → when a change was made, the reply names the files/changes touched plus a
# brief rationale; compact → a terse one-line outcome.
verbosity = "full"
