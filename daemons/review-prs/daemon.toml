[daemon]
backend = "claude"
model = "sonnet"
schedule = { interval = 1200 }
command = "/review-prs"
stuck_after = 1800
required_inputs = ["filter"]
# Read-only work-item lookup, so a PR referencing one is reviewed against its criteria.
sources = ["shortcut"]

[inputs]
filter = "review-requested:@me"
bot_marker = "🤖"
# Which verdicts the daemon may cast:
#   approve         → full ladder: APPROVE / REQUEST_CHANGES / COMMENT
#   request_changes → REQUEST_CHANGES on blocking findings, else COMMENT; never APPROVE
#   comment         → always COMMENT (findings still posted inline); never APPROVE/REQUEST_CHANGES
review_mode = "approve"
# How much detail to post: full (structured body + findings table) or compact (one-liner).
verbosity = "full"
# Diffs touching these globs are HIGH risk: never auto-approved.
high_risk_globs = ["**/auth/**", "**/*payment*", "**/*billing*", "**/*pricing*", "**/*refund*", "**/migrations/**", "**/*.env*", "**/*secret*", "**/Dockerfile*", "**/*.tf"]
