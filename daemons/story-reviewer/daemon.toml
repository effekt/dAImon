[daemon]
backend = "claude"
sources = [{ name = "shortcut", write = true }]
model = "sonnet"
schedule = { interval = 1800 }
command = "/story-reviewer"
stuck_after = 1800
required_inputs = ["triage_state", "ready_label", "skip_label", "assist_label", "human_label"]
mcp = ["codex"]

[inputs]
repos = []
bot_marker = "🤖"
# How much detail the posted assessment carries: full (sectioned template) or compact.
verbosity = "full"
