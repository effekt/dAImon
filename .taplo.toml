# Associates daemon config files with the generated JSON Schema so TOML-aware
# editors (Taplo / VS Code "Even Better TOML") give autocomplete + validation.
# Regenerate the schema with `daimon sync`.
[[rule]]
include = ["daemons/*/daemon.toml", "daemons/*/daemon.local.toml"]
schema = "daemons/daemon.schema.json"
