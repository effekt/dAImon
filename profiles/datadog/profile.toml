[profile]
tool = "datadog"
description = "Datadog logs via the pup CLI"

[defaults]
# How far back each run's log search looks. pup duration syntax (e.g. 15m, 30m, 1h).
lookback = "30m"
# Datadog site. The DD_SITE env var wins; this is only a hint for the reference doc.
dd_site = "us5.datadoghq.com"
