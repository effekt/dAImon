# Local quality gate. Install once with `uv run pre-commit install`, then it runs
# on every commit. CI runs the same checks (see .github/workflows/ci.yml).
# Mirrors `make lint` + `make typecheck` + the shellcheck already in tests/run.sh.
exclude: '^(tui/\.venv/|.*/__pycache__/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: [-x]

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false
      - id: daemon-docs
        name: daemon docs (regenerate per-daemon READMEs)
        entry: python3 -m daimon.gen_docs
        language: system
        pass_filenames: false
        files: '^(daemons/.*/(daemon\.toml|skill/SKILL\.md)|daimon/gen_docs\.py)$'
      - id: check-links
        name: markdown link check
        entry: python3 -m daimon.check_links
        language: system
        pass_filenames: false
        files: '\.md$'
