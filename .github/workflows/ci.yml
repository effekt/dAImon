name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install shellcheck + bats
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats
      - name: Run test suite
        run: bash tests/run.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: ruff lint
        run: uv run ruff check .
      - name: ruff format
        run: uv run ruff format --check .
      - name: pyright
        run: uv run pyright
      - name: unit tests under uv
        run: uv run python -m unittest discover -s tests -p 'test_*.py'
