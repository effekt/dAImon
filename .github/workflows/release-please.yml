name: release-please

# On each push to main, maintain a release PR that bumps the semver version and
# rewrites CHANGELOG.md from the conventional commits. Merging that PR tags the
# version and publishes a GitHub Release.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
