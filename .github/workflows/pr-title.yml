name: pr-title

# Merges are squash-only and the squash commit uses the PR title, so the PR title
# must be a valid Conventional Commit — this keeps main's history conventional.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  conventional:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
